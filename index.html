<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Offsets Extractor (Local)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; font-family: 'Courier New', monospace; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { color: #fff; font-size: 1.8em; font-weight: normal; letter-spacing: 2px; }
        .header p { color: #666; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .panel { background: #0a0a0a; border: 1px solid #333; padding: 20px; }
        .panel h3 { color: #fff; margin-bottom: 15px; font-weight: normal; }
        textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; font-size: 12px; padding: 12px; resize: vertical; }
        button { background: #111; color: #fff; border: 1px solid #333; padding: 12px 24px; cursor: pointer; font-family: monospace; margin-top: 10px; }
        button:hover { background: #222; border-color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 12px; background: #0a0a0a; border-left: 2px solid #fff; color: #ccc; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .file-zone { border: 1px dashed #333; padding: 30px; text-align: center; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; }
        .file-zone:hover { border-color: #0f0; background: #0a0a0a; }
        .progress-container { width: 100%; background: #1a1a1a; margin-top: 10px; position: relative; }
        .progress-bar { width: 0%; height: 20px; background: #0f0; transition: width 0.3s; }
        .progress-text { position: absolute; top: 2px; left: 10px; color: #000; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>NEXUS OFFSETS EXTRACTOR</h1>
        <p>Extract offsets from dump.cs - No API required, works locally</p>
    </div>
    
    <div class="grid">
        <div class="panel">
            <h3>DUMP.CS FILE</h3>
            <div class="file-zone" onclick="document.getElementById('dumpFile').click()">
                <p>📁 CLICK TO SELECT DUMP.CS FILE</p>
                <p style="color:#444; font-size:12px;">Any file size - processes locally</p>
            </div>
            <input type="file" id="dumpFile" accept=".cs,.txt" style="display:none;" onchange="extractOffsets()">
            
            <div class="progress-container" style="margin-top:15px;">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            
            <div style="margin-top:10px;">
                <span id="scanStatus" style="color:#ff0;">● IDLE</span>
                <span id="bytesRead" style="color:#666; margin-left:10px;">0 MB</span>
                <span id="foundCount" style="color:#0f0; margin-left:10px;">0/8 found</span>
            </div>
        </div>
        
        <div class="panel">
            <h3>EXTRACTED OFFSETS</h3>
            <textarea id="offsetsOutput" rows="20" readonly placeholder="Offsets will appear here..."></textarea>
            <button onclick="copyOffsets()">COPY TO CLIPBOARD</button>
        </div>
    </div>
    
    <div id="status" class="status">Ready - Select a dump.cs file</div>
</div>

<script>
let scanActive = false;
let scanCancelled = false;
let foundOffsets = {};

const searchFunctions = [
    { name: 'get_LocalPlayer', keywords: ['get_LocalPlayer', 'GetLocalPlayer', 'LocalPlayer', 'localPlayer'] },
    { name: 'get_Players', keywords: ['get_Players', 'GetPlayers', 'getPlayers', 'Players', 'playerList'] },
    { name: 'get_Position', keywords: ['get_Position', 'GetPosition', 'position', 'Position', 'get_pos'] },
    { name: 'get_Rotation', keywords: ['get_Rotation', 'GetRotation', 'rotation', 'Rotation', 'get_rot'] },
    { name: 'get_Team', keywords: ['get_Team', 'GetTeam', 'team', 'Team', 'teamId', 'TeamId'] },
    { name: 'get_Health', keywords: ['get_Health', 'GetHealth', 'health', 'Health', 'currentHealth'] },
    { name: 'WorldToScreenPoint', keywords: ['WorldToScreenPoint', 'WorldToScreen', 'worldToScreen'] },
    { name: 'Camera_get_main', keywords: ['get_main', 'GetMain', 'mainCamera', 'Camera.main'] }
];

function extractOffsets() {
    const file = document.getElementById('dumpFile').files[0];
    if (!file) return;
    
    scanActive = true;
    scanCancelled = false;
    
    for (let f of searchFunctions) {
        foundOffsets[f.name] = null;
    }
    
    document.getElementById('offsetsOutput').value = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').innerHTML = '0%';
    document.getElementById('scanStatus').innerHTML = '● SCANNING';
    document.getElementById('scanStatus').style.color = '#0f0';
    document.getElementById('bytesRead').innerHTML = '0 MB';
    document.getElementById('foundCount').innerHTML = '0/8 found';
    document.getElementById('status').innerHTML = `[STATUS] Scanning ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)...`;
    
    const chunkSize = 1024 * 1024 * 5; // 5 MB chunks
    let offset = 0;
    let leftover = '';
    let totalProcessed = 0;
    
    function processNextChunk() {
        if (scanCancelled) {
            finishScan(true);
            return;
        }
        
        const chunk = file.slice(offset, offset + chunkSize);
        const reader = new FileReader();
        
        reader.onload = function(e) {
            let text = leftover + e.target.result;
            const lines = text.split('\n');
            leftover = lines.pop();
            
            for (const line of lines) {
                const rvaMatch = line.match(/(?:RVA|Offset):\s*0x([0-9A-Fa-f]+)/i);
                if (rvaMatch) {
                    const offsetValue = `0x${rvaMatch[1]}`;
                    
                    for (const func of searchFunctions) {
                        if (foundOffsets[func.name] === null) {
                            for (const keyword of func.keywords) {
                                if (line.toLowerCase().includes(keyword.toLowerCase())) {
                                    foundOffsets[func.name] = offsetValue;
                                    updateDisplay();
                                    break;
                                }
                            }
                        }
                    }
                }
            }
            
            offset += chunkSize;
            const percent = Math.min(100, (offset / file.size) * 100);
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = `${Math.round(percent)}%`;
            document.getElementById('bytesRead').innerHTML = `${(offset / 1024 / 1024).toFixed(1)} MB`;
            
            if (offset < file.size) {
                setTimeout(processNextChunk, 10);
            } else {
                if (leftover.trim()) {
                    const rvaMatch = leftover.match(/(?:RVA|Offset):\s*0x([0-9A-Fa-f]+)/i);
                    if (rvaMatch) {
                        const offsetValue = `0x${rvaMatch[1]}`;
                        for (const func of searchFunctions) {
                            if (foundOffsets[func.name] === null) {
                                for (const keyword of func.keywords) {
                                    if (leftover.toLowerCase().includes(keyword.toLowerCase())) {
                                        foundOffsets[func.name] = offsetValue;
                                        updateDisplay();
                                        break;
                                    }
                                }
                            }
                        }
                    }
                }
                finishScan(false);
            }
        };
        
        reader.onerror = function() {
            document.getElementById('status').innerHTML = '[ERROR] Failed to read file';
            finishScan(true);
        };
        
        reader.readAsText(chunk);
    }
    
    function updateDisplay() {
        let output = '// ============ EXTRACTED OFFSETS ============\n\n';
        let found = 0;
        for (const [name, offset] of Object.entries(foundOffsets)) {
            if (offset !== null) {
                found++;
                output += `${name}_offset = ${offset}\n`;
            } else {
                output += `${name}_offset = 0x00000000 // NOT FOUND\n`;
            }
        }
        output += `\n// ${found}/8 offsets found\n`;
        document.getElementById('offsetsOutput').value = output;
        document.getElementById('foundCount').innerHTML = `${found}/8 found`;
    }
    
    function finishScan(cancelled) {
        scanActive = false;
        const found = Object.values(foundOffsets).filter(v => v !== null).length;
        
        if (cancelled) {
            document.getElementById('scanStatus').innerHTML = '● CANCELLED';
            document.getElementById('scanStatus').style.color = '#ff0';
            document.getElementById('status').innerHTML = '[CANCELLED] Scan stopped.';
        } else {
            document.getElementById('scanStatus').innerHTML = '● COMPLETE';
            document.getElementById('scanStatus').style.color = '#0f0';
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').innerHTML = '100%';
            
            if (found === 0) {
                document.getElementById('status').innerHTML = '[WARNING] No offsets found. The dump may be heavily obfuscated.';
            } else {
                document.getElementById('status').innerHTML = `[COMPLETE] ${found}/8 offsets found.`;
            }
        }
    }
    
    processNextChunk();
}

function copyOffsets() {
    navigator.clipboard.writeText(document.getElementById('offsetsOutput').value);
    document.getElementById('status').innerHTML = '[INFO] Offsets copied to clipboard';
}
</script>
</body>
</html>

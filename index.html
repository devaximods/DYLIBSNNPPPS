<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Offsets Extractor (Simple)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; font-family: 'Courier New', monospace; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { color: #fff; font-size: 1.8em; font-weight: normal; letter-spacing: 2px; }
        .header p { color: #666; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .panel { background: #0a0a0a; border: 1px solid #333; padding: 20px; }
        .panel h3 { color: #fff; margin-bottom: 15px; font-weight: normal; }
        textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; font-size: 12px; padding: 12px; resize: vertical; }
        button { background: #111; color: #fff; border: 1px solid #333; padding: 12px 24px; cursor: pointer; font-family: monospace; margin-top: 10px; }
        button:hover { background: #222; border-color: #fff; }
        .status { margin-top: 15px; padding: 12px; background: #0a0a0a; border-left: 2px solid #fff; color: #ccc; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .file-zone { border: 1px dashed #333; padding: 30px; text-align: center; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; }
        .file-zone:hover { border-color: #0f0; background: #0a0a0a; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>NEXUS OFFSETS EXTRACTOR</h1>
        <p>Simple pattern-based extraction</p>
    </div>
    
    <div class="grid">
        <div class="panel">
            <h3>DUMP.CS FILE</h3>
            <div class="file-zone" onclick="document.getElementById('dumpFile').click()">
                <p>📁 CLICK TO SELECT DUMP.CS FILE</p>
            </div>
            <input type="file" id="dumpFile" accept=".cs,.txt" style="display:none;" onchange="extractOffsets()">
            <button id="extractBtn" onclick="extractOffsets()" style="margin-top:15px;">EXTRACT OFFSETS</button>
        </div>
        
        <div class="panel">
            <h3>EXTRACTED OFFSETS</h3>
            <textarea id="offsetsOutput" rows="20" readonly placeholder="Offsets will appear here..."></textarea>
            <button onclick="copyOffsets()">COPY TO CLIPBOARD</button>
        </div>
    </div>
    
    <div id="status" class="status">Ready - Select a dump.cs file</div>
</div>

<script>
function extractOffsets() {
    const file = document.getElementById('dumpFile').files[0];
    if (!file) return;
    
    const statusDiv = document.getElementById('status');
    const outputDiv = document.getElementById('offsetsOutput');
    const extractBtn = document.getElementById('extractBtn');
    
    statusDiv.innerHTML = `[STATUS] Loading ${file.name}...`;
    extractBtn.disabled = true;
    
    const reader = new FileReader();
    
    reader.onload = function(e) {
        statusDiv.innerHTML = `[STATUS] Analyzing ${file.name}...`;
        
        const content = e.target.result;
        const lines = content.split('\n');
        
        statusDiv.innerHTML = `[STATUS] Scanning ${lines.length.toLocaleString()} lines...`;
        
        // Patterns to search
        const searches = [
            { name: 'get_LocalPlayer', patterns: [/get_LocalPlayer/i, /LocalPlayer/i] },
            { name: 'get_Players', patterns: [/get_Players/i, /get_AllPlayers/i] },
            { name: 'get_Position', patterns: [/get_Position/i, /get_position/i] },
            { name: 'get_Rotation', patterns: [/get_Rotation/i, /get_rotation/i] },
            { name: 'get_Team', patterns: [/get_Team/i, /get_team/i, /TeamID/i] },
            { name: 'get_Health', patterns: [/get_Health/i, /get_health/i, /CurrentHealth/i] },
            { name: 'WorldToScreenPoint', patterns: [/WorldToScreenPoint/i] },
            { name: 'Camera_get_main', patterns: [/get_main/i, /Camera\.main/i] }
        ];
        
        let results = {};
        for (let s of searches) {
            results[s.name] = null;
        }
        
        // Scan each line
        for (let line of lines) {
            // Look for RVA or Offset pattern
            const match = line.match(/(?:RVA|Offset):\s*0x([0-9A-Fa-f]+)/i);
            if (match) {
                const offset = `0x${match[1]}`;
                
                for (let search of searches) {
                    if (results[search.name] === null) {
                        for (let pattern of search.patterns) {
                            if (pattern.test(line)) {
                                results[search.name] = offset;
                                break;
                            }
                        }
                    }
                }
            }
        }
        
        // Generate output
        let output = '// ============ EXTRACTED OFFSETS ============\n\n';
        let foundCount = 0;
        for (let [name, offset] of Object.entries(results)) {
            if (offset) {
                output += `${name}_offset = ${offset}\n`;
                foundCount++;
            } else {
                output += `${name}_offset = 0x00000000 // NOT FOUND\n`;
            }
        }
        output += `\n// ${foundCount}/8 offsets found\n`;
        
        outputDiv.value = output;
        statusDiv.innerHTML = `[COMPLETE] ${foundCount}/8 offsets found.`;
        extractBtn.disabled = false;
    };
    
    reader.onerror = function() {
        statusDiv.innerHTML = '[ERROR] Failed to read file. File may be too large.';
        extractBtn.disabled = false;
    };
    
    reader.readAsText(file);
}

function copyOffsets() {
    const text = document.getElementById('offsetsOutput').value;
    navigator.clipboard.writeText(text);
    document.getElementById('status').innerHTML = '[INFO] Offsets copied to clipboard';
}
</script>
</body>
</html>

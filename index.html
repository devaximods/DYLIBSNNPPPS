<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Raw Offsets Extractor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; font-family: 'Courier New', monospace; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { color: #fff; font-size: 1.8em; font-weight: normal; letter-spacing: 2px; }
        .header p { color: #666; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .panel { background: #0a0a0a; border: 1px solid #333; padding: 20px; }
        .panel h3 { color: #fff; margin-bottom: 15px; font-weight: normal; }
        textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; font-size: 12px; padding: 12px; resize: vertical; }
        button { background: #111; color: #fff; border: 1px solid #333; padding: 12px 24px; cursor: pointer; font-family: monospace; margin-top: 10px; }
        button:hover { background: #222; border-color: #fff; }
        .status { margin-top: 15px; padding: 12px; background: #0a0a0a; border-left: 2px solid #fff; color: #ccc; font-size: 12px; max-height: 150px; overflow-y: auto; }
        .file-zone { border: 1px dashed #333; padding: 30px; text-align: center; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; }
        .file-zone:hover { border-color: #0f0; background: #0a0a0a; }
        .progress-container { width: 100%; background: #1a1a1a; margin-top: 10px; position: relative; }
        .progress-bar { width: 0%; height: 20px; background: #0f0; transition: width 0.3s; }
        .progress-text { position: absolute; top: 2px; left: 10px; color: #000; font-size: 11px; font-weight: bold; }
        .offset-list { max-height: 400px; overflow-y: auto; }
        .offset-item { font-family: monospace; padding: 4px; border-bottom: 1px solid #333; cursor: pointer; }
        .offset-item:hover { background: #1a1a1a; }
        .offset-selected { background: #0a3a0a; border-left: 2px solid #0f0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>NEXUS RAW OFFSETS EXTRACTOR</h1>
        <p>Extracts ALL offsets from dump.cs - then you select which ones to use</p>
    </div>
    
    <div class="grid">
        <div class="panel">
            <h3>DUMP.CS FILE</h3>
            <div class="file-zone" onclick="document.getElementById('dumpFile').click()">
                <p>📁 CLICK TO SELECT DUMP.CS FILE</p>
            </div>
            <input type="file" id="dumpFile" accept=".cs,.txt" style="display:none;" onchange="extractAllOffsets()">
            
            <div class="progress-container" style="margin-top:15px;">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            
            <div style="margin-top:10px;">
                <span id="scanStatus" style="color:#ff0;">● IDLE</span>
                <span id="bytesRead" style="color:#666; margin-left:10px;">0 MB</span>
                <span id="foundCount" style="color:#0f0; margin-left:10px;">0 offsets</span>
            </div>
        </div>
        
        <div class="panel">
            <h3>ALL OFFSETS FOUND</h3>
            <div id="offsetsList" class="offset-list" style="height: 400px; overflow-y: auto; background: #000; border: 1px solid #333;">
                <p style="color:#666; padding:20px; text-align:center;">Select a dump.cs file</p>
            </div>
            <button onclick="generateOffsetsFromSelection()">GENERATE FROM SELECTED</button>
            <button onclick="copyAllOffsets()">COPY ALL OFFSETS</button>
        </div>
    </div>
    
    <div id="status" class="status">Ready - Select a dump.cs file</div>
    <textarea id="outputOffsets" rows="5" readonly placeholder="Generated offsets will appear here..." style="margin-top:15px;"></textarea>
</div>

<script>
let allOffsets = [];
let selectedOffsets = {};

function extractAllOffsets() {
    const file = document.getElementById('dumpFile').files[0];
    if (!file) return;
    
    allOffsets = [];
    selectedOffsets = {};
    
    document.getElementById('offsetsList').innerHTML = '<p style="color:#666; padding:20px; text-align:center;">Scanning...</p>';
    document.getElementById('outputOffsets').value = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').innerHTML = '0%';
    document.getElementById('scanStatus').innerHTML = '● SCANNING';
    document.getElementById('scanStatus').style.color = '#0f0';
    document.getElementById('bytesRead').innerHTML = '0 MB';
    document.getElementById('foundCount').innerHTML = '0 offsets';
    document.getElementById('status').innerHTML = `[STATUS] Scanning ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)...`;
    
    const chunkSize = 1024 * 1024 * 2; // 2 MB chunks
    let offset = 0;
    let leftover = '';
    let uniqueOffsets = new Map();
    
    function processNextChunk() {
        const chunk = file.slice(offset, offset + chunkSize);
        const reader = new FileReader();
        
        reader.onload = function(e) {
            let text = leftover + e.target.result;
            const lines = text.split('\n');
            leftover = lines.pop();
            
            for (const line of lines) {
                // Extract RVA or Offset
                const rvaMatch = line.match(/(?:RVA|Offset):\s*0x([0-9A-Fa-f]+)/i);
                if (rvaMatch) {
                    const offsetValue = `0x${rvaMatch[1]}`;
                    if (!uniqueOffsets.has(offsetValue)) {
                        // Try to get function name from the line
                        let funcName = '';
                        const nameMatch = line.match(/public\s+\w+\s+(\w+)\s*\(/);
                        if (nameMatch) {
                            funcName = nameMatch[1];
                        }
                        uniqueOffsets.set(offsetValue, {
                            offset: offsetValue,
                            funcName: funcName,
                            preview: line.substring(0, 100)
                        });
                    }
                }
            }
            
            offset += chunkSize;
            const percent = Math.min(100, (offset / file.size) * 100);
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = `${Math.round(percent)}%`;
            document.getElementById('bytesRead').innerHTML = `${(offset / 1024 / 1024).toFixed(1)} MB`;
            document.getElementById('foundCount').innerHTML = `${uniqueOffsets.size} offsets`;
            document.getElementById('status').innerHTML = `[STATUS] Scanning... ${Math.round(percent)}% | ${uniqueOffsets.size} unique offsets found`;
            
            if (offset < file.size) {
                setTimeout(processNextChunk, 5);
            } else {
                finishScan(uniqueOffsets);
            }
        };
        
        reader.onerror = function() {
            document.getElementById('status').innerHTML = '[ERROR] Failed to read file';
            finishScan(new Map());
        };
        
        reader.readAsText(chunk);
    }
    
    function finishScan(offsetsMap) {
        allOffsets = Array.from(offsetsMap.values());
        // Sort by offset value
        allOffsets.sort((a, b) => parseInt(a.offset, 16) - parseInt(b.offset, 16));
        
        displayOffsetsList();
        document.getElementById('scanStatus').innerHTML = '● COMPLETE';
        document.getElementById('scanStatus').style.color = '#0f0';
        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('progressText').innerHTML = '100%';
        document.getElementById('status').innerHTML = `[COMPLETE] ${allOffsets.length} unique offsets found. Select the ones you need.`;
    }
    
    function displayOffsetsList() {
        const container = document.getElementById('offsetsList');
        let html = '';
        
        for (let i = 0; i < allOffsets.length; i++) {
            const item = allOffsets[i];
            const isSelected = selectedOffsets[item.offset];
            html += `<div class="offset-item ${isSelected ? 'offset-selected' : ''}" onclick="toggleOffset('${item.offset}')">
                <span style="color:#0f0;">${item.offset}</span>
                ${item.funcName ? `<span style="color:#ff0;"> → ${item.funcName}</span>` : ''}
                <span style="color:#666; display:block; font-size:10px;">${item.preview.substring(0, 80)}...</span>
            </div>`;
        }
        
        if (allOffsets.length === 0) {
            html = '<p style="color:#666; padding:20px; text-align:center;">No offsets found. The dump may not contain RVA/Offset patterns.</p>';
        }
        
        container.innerHTML = html;
    }
    
    processNextChunk();
}

function toggleOffset(offset) {
    if (selectedOffsets[offset]) {
        delete selectedOffsets[offset];
    } else {
        selectedOffsets[offset] = true;
    }
    displayOffsetsList();
    updateSelectedCount();
}

function updateSelectedCount() {
    const count = Object.keys(selectedOffsets).length;
    document.getElementById('status').innerHTML = `[INFO] ${count} offsets selected. Click "GENERATE FROM SELECTED" to create your offset list.`;
}

function generateOffsetsFromSelection() {
    const selected = Object.keys(selectedOffsets);
    if (selected.length === 0) {
        document.getElementById('status').innerHTML = '[ERROR] No offsets selected. Click on offsets to select them.';
        return;
    }
    
    let output = '// ============ SELECTED OFFSETS ============\n\n';
    output += `// Total selected: ${selected.length}\n\n`;
    
    // Group by possible function types (heuristic based on address range)
    output += '// You can rename these in your Tweak.xm file\n\n';
    
    for (let i = 0; i < selected.length; i++) {
        output += `#define CUSTOM_OFFSET_${i}    ${selected[i]}\n`;
    }
    
    output += '\n// ============ USAGE ============\n';
    output += '// Copy these #defines into your Tweak.xm file\n';
    output += '// Rename CUSTOM_OFFSET_X to meaningful names like OFFSET_GET_POSITION\n';
    
    document.getElementById('outputOffsets').value = output;
    document.getElementById('status').innerHTML = `[SUCCESS] ${selected.length} offsets generated. Copy them to your Tweak.xm file.`;
}

function copyAllOffsets() {
    let text = '';
    for (const item of allOffsets) {
        text += `${item.offset}\n`;
    }
    navigator.clipboard.writeText(text);
    document.getElementById('status').innerHTML = '[INFO] All offsets copied to clipboard';
}

function displayOffsetsList() {
    const container = document.getElementById('offsetsList');
    let html = '';
    
    for (let i = 0; i < allOffsets.length; i++) {
        const item = allOffsets[i];
        const isSelected = selectedOffsets[item.offset];
        html += `<div class="offset-item ${isSelected ? 'offset-selected' : ''}" onclick="toggleOffset('${item.offset}')">
            <span style="color:#0f0;">${item.offset}</span>
            ${item.funcName ? `<span style="color:#ff0;"> → ${item.funcName}</span>` : ''}
            <span style="color:#666; display:block; font-size:10px;">${item.preview.substring(0, 80)}...</span>
        </div>`;
    }
    
    if (allOffsets.length === 0) {
        html = '<p style="color:#666; padding:20px; text-align:center;">No offsets found.</p>';
    }
    
    container.innerHTML = html;
}
</script>
</body>
</html>

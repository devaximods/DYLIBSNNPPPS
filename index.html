<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - AI Offsets & Dylib Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; font-family: 'Courier New', monospace; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { color: #fff; font-size: 1.8em; font-weight: normal; letter-spacing: 2px; }
        .header p { color: #666; margin-top: 10px; }
        .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid #333; flex-wrap: wrap; }
        .tab-btn { background: #000; color: #ccc; border: 1px solid #333; border-bottom: none; padding: 12px 24px; cursor: pointer; font-family: monospace; }
        .tab-btn.active { background: #111; color: #fff; border-color: #fff; }
        .tab-content { display: none; background: #0a0a0a; border: 1px solid #333; padding: 20px; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .panel { background: #0a0a0a; border: 1px solid #333; padding: 20px; }
        .panel h3 { color: #fff; margin-bottom: 15px; font-weight: normal; }
        textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; font-size: 12px; padding: 12px; resize: vertical; }
        input, select { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-family: monospace; }
        button { background: #111; color: #fff; border: 1px solid #333; padding: 12px 24px; cursor: pointer; font-family: monospace; margin-top: 10px; }
        button:hover { background: #222; border-color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 12px; background: #0a0a0a; border-left: 2px solid #fff; color: #ccc; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .file-zone { border: 1px dashed #333; padding: 30px; text-align: center; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; }
        .file-zone:hover { border-color: #0f0; background: #0a0a0a; }
        .progress-container { width: 100%; background: #1a1a1a; margin-top: 10px; position: relative; }
        .progress-bar { width: 0%; height: 20px; background: #0f0; transition: width 0.3s; }
        .progress-text { position: absolute; top: 2px; left: 10px; color: #000; font-size: 11px; font-weight: bold; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #0f0; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .download-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #0a0a0a; border: 1px solid #0f0; color: #0f0; text-decoration: none; }
        hr { border-color: #333; margin: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>NEXUS AI OFFSETS & DYLIB BUILDER</h1>
        <p>Extract offsets from dump.cs | AI optional | Build dylib</p>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('offsets')">OFFSETS EXTRACTOR</button>
        <button class="tab-btn" onclick="switchTab('builder')">DYLIB BUILDER</button>
    </div>
    
    <!-- Tab 1: Offsets Extractor -->
    <div id="offsets" class="tab-content active">
        <div class="grid">
            <div class="panel">
                <h3>DUMP.CS FILE</h3>
                <div class="file-zone" onclick="document.getElementById('dumpFile').click()">
                    <p>📁 CLICK TO SELECT DUMP.CS FILE</p>
                    <p style="color:#444; font-size:12px;">Any file size - deep scan</p>
                </div>
                <input type="file" id="dumpFile" accept=".cs,.txt" style="display:none;" onchange="deepScan()">
                
                <div style="margin-top:15px;">
                    <label style="color:#fff;">AI Analysis (optional)</label>
                    <select id="aiProvider">
                        <option value="none">None (local scan only)</option>
                        <option value="groq">Groq (free)</option>
                        <option value="deepseek">DeepSeek (paid)</option>
                    </select>
                </div>
                
                <div style="margin-top:10px;" id="aiKeyDiv" style="display:none;">
                    <label style="color:#fff;">API Key</label>
                    <input type="password" id="apiKey" placeholder="...">
                </div>
                
                <div class="progress-container" style="margin-top:15px;">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="progress-text" id="progressText">0%</div>
                </div>
                
                <div style="margin-top:10px;">
                    <span id="scanStatus" style="color:#ff0;">● IDLE</span>
                    <span id="bytesRead" style="color:#666; margin-left:10px;">0 MB</span>
                    <span id="foundCount" style="color:#0f0; margin-left:10px;">0 found</span>
                </div>
                
                <button onclick="deepScan()">DEEP SCAN</button>
                <button id="cancelBtn" onclick="cancelScan()" style="display:none; background:#330000;">CANCEL</button>
            </div>
            
            <div class="panel">
                <h3>EXTRACTED OFFSETS</h3>
                <textarea id="offsetsOutput" rows="20" readonly placeholder="Results will appear here..."></textarea>
                <button onclick="copyOffsets()">COPY TO CLIPBOARD</button>
                <button onclick="sendToBuilder()">SEND TO BUILDER</button>
            </div>
        </div>
        <div id="status" class="status">Ready - Select a dump.cs file</div>
    </div>
    
    <!-- Tab 2: Dylib Builder -->
    <div id="builder" class="tab-content">
        <div class="grid">
            <div class="panel">
                <h3>TWEAK.XM CODE</h3>
                <textarea id="tweakCode" rows="15" placeholder="Paste your Tweak.xm code here..."></textarea>
                <div style="margin-top:10px;">
                    <label style="color:#fff;">GitHub Token (repo scope)</label>
                    <input type="password" id="githubToken" placeholder="github_pat_...">
                </div>
                <div style="margin-top:10px;">
                    <label style="color:#fff;">Repository (owner/name)</label>
                    <input type="text" id="repoPath" placeholder="username/repo-name">
                </div>
                <div style="margin-top:10px;">
                    <label style="color:#fff;">Tweak Name</label>
                    <input type="text" id="tweakName" value="NexusMod">
                </div>
                <button onclick="buildDylib()">BUILD DYLIB</button>
                <div class="progress-container" id="buildProgress" style="display:none;"><div class="progress-bar" id="buildProgressFill"></div></div>
            </div>
            <div class="panel">
                <h3>OUTPUT</h3>
                <div id="builderOutput" class="status" style="min-height: 200px;">Ready</div>
                <div id="downloadSection" style="display:none;"><hr><a id="downloadLink" class="download-link">DOWNLOAD DYLIB</a></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let scanActive = false;
let scanCancelled = false;
let foundOffsets = {};
let pollingInterval = null;

// Extended keywords for deep scan
const searchFunctions = [
    { name: 'get_LocalPlayer', keywords: ['LocalPlayer', 'get_LocalPlayer', 'GetLocalPlayer', 'localPlayer', '_localPlayer', 'm_localPlayer'] },
    { name: 'get_Players', keywords: ['get_Players', 'GetPlayers', 'getPlayers', 'Players', 'playerList', 'm_players', '_players'] },
    { name: 'get_Position', keywords: ['get_Position', 'GetPosition', 'get_position', 'position', 'Position', 'get_pos', '_position', 'm_position'] },
    { name: 'get_Rotation', keywords: ['get_Rotation', 'GetRotation', 'get_rotation', 'rotation', 'Rotation', 'get_rot', '_rotation', 'm_rotation'] },
    { name: 'get_Team', keywords: ['get_Team', 'GetTeam', 'get_team', 'team', 'Team', 'teamId', 'TeamId', 'm_team', '_team'] },
    { name: 'get_Health', keywords: ['get_Health', 'GetHealth', 'get_health', 'health', 'Health', 'currentHealth', 'm_health', '_health'] },
    { name: 'WorldToScreenPoint', keywords: ['WorldToScreenPoint', 'WorldToScreen', 'worldToScreen', 'WorldToScreenPoint_Injected'] },
    { name: 'Camera_get_main', keywords: ['get_main', 'GetMain', 'mainCamera', 'MainCamera', 'Camera.main', 'get_mainCamera'] }
];

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}

function deepScan() {
    const file = document.getElementById('dumpFile').files[0];
    if (!file) return;
    
    scanActive = true;
    scanCancelled = false;
    
    for (let f of searchFunctions) {
        foundOffsets[f.name] = null;
    }
    
    document.getElementById('offsetsOutput').value = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').innerHTML = '0%';
    document.getElementById('cancelBtn').style.display = 'inline-block';
    document.getElementById('scanStatus').innerHTML = '● SCANNING';
    document.getElementById('scanStatus').style.color = '#0f0';
    document.getElementById('bytesRead').innerHTML = '0 MB';
    document.getElementById('foundCount').innerHTML = '0/8 found';
    document.getElementById('status').innerHTML = `[STATUS] Deep scanning ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)...`;
    
    const chunkSize = 1024 * 1024 * 2; // 2 MB chunks for smoother scan
    let offset = 0;
    let leftover = '';
    let totalLines = 0;
    let foundAny = false;
    
    function processNextChunk() {
        if (scanCancelled) {
            finishScan(true);
            return;
        }
        
        const chunk = file.slice(offset, offset + chunkSize);
        const reader = new FileReader();
        
        reader.onload = function(e) {
            let text = leftover + e.target.result;
            const lines = text.split('\n');
            leftover = lines.pop();
            
            for (const line of lines) {
                totalLines++;
                
                // Look for RVA or Offset pattern
                const rvaMatch = line.match(/(?:RVA|Offset):\s*0x([0-9A-Fa-f]+)/i);
                if (rvaMatch) {
                    const offsetValue = `0x${rvaMatch[1]}`;
                    
                    for (const func of searchFunctions) {
                        if (foundOffsets[func.name] === null) {
                            for (const keyword of func.keywords) {
                                if (line.toLowerCase().includes(keyword.toLowerCase())) {
                                    foundOffsets[func.name] = offsetValue;
                                    foundAny = true;
                                    updateDisplay();
                                    break;
                                }
                            }
                        }
                    }
                }
            }
            
            offset += chunkSize;
            const percent = Math.min(100, (offset / file.size) * 100);
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = `${Math.round(percent)}%`;
            document.getElementById('bytesRead').innerHTML = `${(offset / 1024 / 1024).toFixed(1)} MB`;
            
            const found = Object.values(foundOffsets).filter(v => v !== null).length;
            document.getElementById('foundCount').innerHTML = `${found}/8 found`;
            document.getElementById('status').innerHTML = `[STATUS] Scanning... ${Math.round(percent)}% | ${(totalLines/1000).toFixed(0)}k lines | ${found}/8 found`;
            
            if (offset < file.size) {
                setTimeout(processNextChunk, 5);
            } else {
                if (leftover.trim()) {
                    const rvaMatch = leftover.match(/(?:RVA|Offset):\s*0x([0-9A-Fa-f]+)/i);
                    if (rvaMatch) {
                        const offsetValue = `0x${rvaMatch[1]}`;
                        for (const func of searchFunctions) {
                            if (foundOffsets[func.name] === null) {
                                for (const keyword of func.keywords) {
                                    if (leftover.toLowerCase().includes(keyword.toLowerCase())) {
                                        foundOffsets[func.name] = offsetValue;
                                        foundAny = true;
                                        updateDisplay();
                                        break;
                                    }
                                }
                            }
                        }
                    }
                }
                finishScan(false);
            }
        };
        
        reader.onerror = function() {
            document.getElementById('status').innerHTML = '[ERROR] Failed to read file';
            finishScan(true);
        };
        
        reader.readAsText(chunk);
    }
    
    function updateDisplay() {
        let output = '// ============ DEEP SCAN RESULTS ============\n\n';
        let found = 0;
        for (const [name, offset] of Object.entries(foundOffsets)) {
            if (offset !== null) {
                found++;
                output += `${name}_offset = ${offset}\n`;
            } else {
                output += `${name}_offset = 0x00000000\n`;
            }
        }
        output += `\n// ${found}/8 offsets found\n`;
        document.getElementById('offsetsOutput').value = output;
    }
    
    function finishScan(cancelled) {
        scanActive = false;
        document.getElementById('cancelBtn').style.display = 'none';
        
        const found = Object.values(foundOffsets).filter(v => v !== null).length;
        
        if (cancelled) {
            document.getElementById('scanStatus').innerHTML = '● CANCELLED';
            document.getElementById('scanStatus').style.color = '#ff0';
            document.getElementById('status').innerHTML = '[CANCELLED] Scan stopped.';
        } else {
            document.getElementById('scanStatus').innerHTML = '● COMPLETE';
            document.getElementById('scanStatus').style.color = '#0f0';
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').innerHTML = '100%';
            
            if (found === 0) {
                document.getElementById('status').innerHTML = '[WARNING] No offsets found. The dump is heavily obfuscated.';
            } else {
                document.getElementById('status').innerHTML = `[COMPLETE] ${found}/8 offsets found.`;
            }
        }
    }
    
    processNextChunk();
}

function cancelScan() {
    if (scanActive) {
        scanCancelled = true;
        document.getElementById('scanStatus').innerHTML = '● CANCELLING...';
    }
}

function copyOffsets() {
    navigator.clipboard.writeText(document.getElementById('offsetsOutput').value);
    document.getElementById('status').innerHTML = '[INFO] Offsets copied to clipboard';
}

function sendToBuilder() {
    const offsetsText = document.getElementById('offsetsOutput').value;
    const tweakCode = document.getElementById('tweakCode').value;
    
    if (!tweakCode) {
        document.getElementById('status').innerHTML = '[ERROR] No Tweak.xm code in builder tab';
        return;
    }
    
    let newCode = tweakCode;
    const lines = offsetsText.split('\n');
    for (const line of lines) {
        if (line.includes('_offset = 0x') && !line.includes('0x00000000')) {
            const match = line.match(/(\w+)_offset = (0x[0-9A-Fa-f]+)/);
            if (match) {
                const name = match[1];
                const offset = match[2];
                const regex = new RegExp(`#define ${name}\\s+0x[0-9A-Fa-f]+`, 'i');
                newCode = newCode.replace(regex, `#define ${name}    ${offset}`);
            }
        }
    }
    
    document.getElementById('tweakCode').value = newCode;
    document.getElementById('status').innerHTML = '[SUCCESS] Offsets injected into builder';
    switchTab('builder');
}

// ============ DYLIB BUILDER ============
async function buildDylib() {
    const tweakCode = document.getElementById('tweakCode').value;
    const token = document.getElementById('githubToken').value;
    const repoPath = document.getElementById('repoPath').value;
    const tweakName = document.getElementById('tweakName').value.trim() || 'NexusMod';
    const output = document.getElementById('builderOutput');
    const buildBtn = event.target;
    
    if (!tweakCode.trim()) { output.innerHTML = '[ERROR] Please paste Tweak.xm code'; return; }
    if (!token) { output.innerHTML = '[ERROR] GitHub token required'; return; }
    if (!repoPath) { output.innerHTML = '[ERROR] Repository path required (owner/repo)'; return; }
    
    const [owner, repo] = repoPath.split('/');
    if (!owner || !repo) { output.innerHTML = '[ERROR] Invalid repository format. Use: username/repo-name'; return; }
    
    buildBtn.disabled = true;
    output.innerHTML = '[STATUS] Generating files...';
    document.getElementById('buildProgress').style.display = 'block';
    const progressFill = document.getElementById('buildProgressFill');
    progressFill.style.width = '10%';
    
    const files = generateTweakFiles(tweakCode, tweakName);
    progressFill.style.width = '30%';
    
    output.innerHTML = '[STATUS] Uploading to GitHub...';
    let success = true;
    let uploaded = 0;
    const total = Object.keys(files).length;
    
    for (const [path, content] of Object.entries(files)) {
        try {
            await uploadToGitHub(token, owner, repo, path, content);
            uploaded++;
            output.innerHTML = `[STATUS] Uploading... (${uploaded}/${total})`;
        } catch(e) {
            output.innerHTML = `[ERROR] Failed to upload ${path}: ${e.message}`;
            success = false;
            break;
        }
    }
    
    if (!success) { buildBtn.disabled = false; return; }
    
    progressFill.style.width = '60%';
    output.innerHTML = '[STATUS] Triggering compilation...';
    
    const triggered = await triggerWorkflow(token, owner, repo);
    if (!triggered) {
        output.innerHTML = '[ERROR] Failed to trigger workflow.';
        buildBtn.disabled = false;
        return;
    }
    
    progressFill.style.width = '70%';
    output.innerHTML = '[STATUS] Compilation started. Waiting for result...';
    
    startPolling(token, owner, repo, output, progressFill, buildBtn);
}

function generateTweakFiles(tweakCode, tweakName) {
    const files = {};
    files[`${tweakName}/Tweak.xm`] = tweakCode;
    files[`${tweakName}/Makefile`] = `export TARGET = iphone:latest:15.0\nexport ARCHS = arm64\n\ninclude $(THEOS)/makefiles/common.mk\n\nTWEAK_NAME = ${tweakName}\n${tweakName}_FILES = Tweak.xm\n${tweakName}_FRAMEWORKS = UIKit StoreKit QuartzCore\n\ninclude $(THEOS)/makefiles/tweak.mk`;
    files[`${tweakName}/control`] = `Package: com.nexus.${tweakName.toLowerCase()}\nName: ${tweakName}\nVersion: 1.0\nArchitecture: iphoneos-arm64\nDescription: Nexus Mod\nMaintainer: Nexus\nAuthor: Nexus\nSection: Tweaks`;
    files[`${tweakName}/${tweakName}.plist`] = `<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n    <key>Filter</key>\n    <dict>\n        <key>Bundles</key>\n        <array>\n            <string>com.apple.UIKit</string>\n        </array>\n    </dict>\n</dict>\n</plist>`;
    files[`${tweakName}/.github/workflows/build.yml`] = `name: Build Tweak\n\non:\n  push:\n  workflow_dispatch:\n\njobs:\n  build:\n    runs-on: macos-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Install Theos dependencies\n        run: brew install ldid xz\n      - name: Checkout Theos\n        uses: actions/checkout@v4\n        with:\n          repository: theos/theos\n          path: theos\n          submodules: recursive\n      - name: Setup Theos\n        run: |\n          export THEOS=$(pwd)/theos\n          echo "THEOS=$THEOS" >> $GITHUB_ENV\n          echo "$THEOS/bin" >> $GITHUB_PATH\n      - name: Build Package\n        run: |\n          export THEOS=$(pwd)/theos\n          make package\n      - name: Upload .dylib\n        uses: actions/upload-artifact@v4\n        with:\n          name: ${tweakName}_dylib\n          path: .theos/obj/debug/*.dylib`;
    return files;
}

async function uploadToGitHub(token, owner, repo, path, content) {
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
    let sha = '';
    try {
        const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
        if (res.ok) { const data = await res.json(); sha = data.sha; }
    } catch(e) {}
    const body = { message: `Update ${path}`, content: btoa(unescape(encodeURIComponent(content))), branch: 'main' };
    if (sha) body.sha = sha;
    const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

async function triggerWorkflow(token, owner, repo) {
    const url = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/build.yml/dispatches`;
    const res = await fetch(url, { method: 'POST', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ ref: 'main' }) });
    return res.ok;
}

async function startPolling(token, owner, repo, output, progressFill, buildBtn) {
    if (pollingInterval) clearInterval(pollingInterval);
    let attempts = 0;
    const maxAttempts = 60;
    pollingInterval = setInterval(async () => {
        attempts++;
        output.innerHTML = `[STATUS] Compiling... (${attempts * 5}s)`;
        progressFill.style.width = `${70 + (attempts * 0.5)}%`;
        const artifactUrl = await getArtifactUrl(token, owner, repo);
        if (artifactUrl) {
            clearInterval(pollingInterval);
            progressFill.style.width = '100%';
            output.innerHTML = '[SUCCESS] Compilation complete!';
            const downloadDiv = document.getElementById('downloadSection');
            const downloadLink = document.getElementById('downloadLink');
            downloadLink.href = artifactUrl;
            downloadLink.innerHTML = 'DOWNLOAD DYLIB';
            downloadDiv.style.display = 'block';
            buildBtn.disabled = false;
        }
        if (attempts >= maxAttempts) {
            clearInterval(pollingInterval);
            output.innerHTML = '[TIMEOUT] Check GitHub Actions manually.';
            buildBtn.disabled = false;
        }
    }, 5000);
}

async function getArtifactUrl(token, owner, repo) {
    try {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/artifacts`, { headers: { 'Authorization': `token ${token}` } });
        const data = await res.json();
        if (data.artifacts && data.artifacts.length > 0 && !data.artifacts[0].expired) {
            return data.artifacts[0].archive_download_url;
        }
    } catch(e) {}
    return null;
}
</script>
</body>
</html>

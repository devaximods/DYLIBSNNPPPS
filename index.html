<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NEXUS PRO - Dump Analyzer</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:20px; }
.container { max-width:1400px; margin:auto; }
input, select, button { background:#000; color:#0f0; border:1px solid #333; padding:8px; margin:5px; }
button:hover { background:#111; cursor:pointer; }
.results { height:400px; overflow:auto; border:1px solid #333; }
.line { padding:5px; border-bottom:1px solid #222; cursor:pointer; }
.line:hover { background:#111; }
.selected { background:#0a3a0a; }
.rva { color:#ff4d4d; font-weight:bold; margin-left:10px; }
.type { color:#4da6ff; margin-right:5px; }
.class { color:#ffaa00; margin-right:5px; }
</style>
</head>

<body>
<div class="container">

<h2>NEXUS PRO - Dump Analyzer</h2>

<input type="file" id="file">

<br>

<input type="text" id="search" placeholder="Search name...">
<select id="typeFilter"><option value="">All types</option></select>

<br>

<button onclick="exportSelected()">EXPORT</button>
<button onclick="clearSelection()">CLEAR</button>

<div id="results" class="results"></div>

<textarea id="output" style="width:100%; height:200px;"></textarea>

</div>

<script>
let parsed = [];
let filtered = [];
let selected = new Set();
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");

document.getElementById("file").addEventListener("change", loadFile);
document.getElementById("search").addEventListener("input", render);
document.getElementById("typeFilter").addEventListener("change", render);

function loadFile(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(ev){
        const lines = ev.target.result.split("\n");
        parse(lines);
        buildTypes();
        render();
    };

    reader.readAsText(file);
}

function parse(lines){
    parsed = [];
    let currentClass = "GLOBAL";

    const regex = /public\s+([\w<>]+)\s+(\w+)\(.*?\).*?RVA:\s*(0x[0-9A-Fa-f]+)/;

    for(let i=0;i<lines.length;i++){
        let line = lines[i];

        if(line.includes("class ")){
            let m = line.match(/class\s+(\w+)/);
            if(m) currentClass = m[1];
        }

        if(line.includes("RVA")){
            let m = regex.exec(line);
            if(m){
                parsed.push({
                    type:m[1],
                    name:m[2],
                    rva:m[3],
                    class:currentClass,
                    index:i
                });
            }
        }
    }
}

function buildTypes(){
    const types = [...new Set(parsed.map(x=>x.type))];
    const sel = document.getElementById("typeFilter");
    sel.innerHTML = '<option value="">All types</option>';
    types.forEach(t=>{
        let o=document.createElement("option");
        o.value=t; o.textContent=t;
        sel.appendChild(o);
    });
}

function render(){
    const search = document.getElementById("search").value.toLowerCase();
    const type = document.getElementById("typeFilter").value;

    filtered = parsed.filter(x=>{
        return (!search || x.name.toLowerCase().includes(search))
        && (!type || x.type===type);
    });

    filtered.sort((a,b)=>parseInt(a.rva)-parseInt(b.rva));

    const div = document.getElementById("results");
    div.innerHTML = "";

    filtered.forEach(item=>{
        const el = document.createElement("div");
        el.className = "line" + (selected.has(item.index)?" selected":"");

        el.innerHTML = `
            <span class="class">${item.class}</span>
            <span class="type">${item.type}</span>
            <span>${item.name}</span>
            <span class="rva">${item.rva}</span>
        `;

        el.onclick = ()=>toggle(item.index);
        el.ondblclick = ()=>navigator.clipboard.writeText(item.rva);

        div.appendChild(el);
    });
}

function toggle(i){
    if(selected.has(i)) selected.delete(i);
    else selected.add(i);
    render();
}

function clearSelection(){
    selected.clear();
    render();
}

function exportSelected(){
    let out = "// OFFSETS\n\n";

    const sel = parsed.filter(x=>selected.has(x.index));

    sel.forEach(x=>{
        out += `// ${x.class} :: ${x.type} ${x.name}\n`;
        out += `#define ${x.class}_${x.name}`.toUpperCase() + ` ${x.rva}\n\n`;
    });

    document.getElementById("output").value = out;
}
</script>
</body>
</html>

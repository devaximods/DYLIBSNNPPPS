<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS - Dump Searcher</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; font-family:'Courier New', monospace; padding:20px; }

.container { max-width:1400px; margin:auto; }

.header { text-align:center; margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:15px; }
.header h1 { color:#fff; letter-spacing:2px; font-size:1.8em; }
.header p { color:#666; margin-top:8px; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

.panel { background:#0a0a0a; border:1px solid #333; padding:20px; }

input, select {
width:100%;
padding:10px;
margin-top:10px;
background:#000;
color:#0f0;
border:1px solid #333;
font-family:monospace;
}

.results-list {
margin-top:10px;
height:420px;
overflow:auto;
border:1px solid #333;
background:#000;
}

.result-line {
padding:6px;
border-bottom:1px solid #222;
cursor:pointer;
}

.result-line:hover { background:#111; }

.selected { background:#0a3a0a; }

.class { color:#ffaa00; margin-right:5px; }
.type { color:#4da6ff; margin-right:5px; }
.result-addr { color:#0f0; margin-left:10px; }

button {
background:#111;
color:#fff;
border:1px solid #333;
padding:10px;
margin-top:10px;
cursor:pointer;
}

button:hover { background:#222; }

textarea {
width:100%;
margin-top:15px;
height:200px;
background:#000;
color:#0f0;
border:1px solid #333;
padding:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>NEXUS DUMP SEARCHER</h1>
<p>Fast reverse tool</p>
</div>

<div class="grid">

<div class="panel">
<h3 style="color:#fff;">FILE</h3>
<input type="file" id="dumpFile">

<p id="status" style="color:#666;margin-top:10px;">Idle</p>
<p id="lineCount" style="color:#0f0;">0 lines</p>
</div>

<div class="panel">
<h3 style="color:#fff;">SEARCH</h3>

<input type="text" id="searchInput" placeholder="Search..." oninput="filterLines()">

<select id="typeFilter" onchange="filterLines()">
<option value="">All types</option>
</select>

<div id="resultsList" class="results-list"></div>

<button onclick="generateOffsets()">GENERATE OFFSETS</button>
<button onclick="clearSelection()">CLEAR</button>

</div>

</div>

<textarea id="outputOffsets" placeholder="Offsets output..."></textarea>

</div>

<script>

let parsedData = [];
let filteredLines = [];
let selectedIndices = new Set();

/* LOAD FILE */
document.getElementById("dumpFile").addEventListener("change", loadDump);

function loadDump(e){
const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

document.getElementById("status").innerText = "Loading...";

reader.onload = function(ev){

const lines = ev.target.result.split("\n");

parseDump(lines);
buildTypes();

document.getElementById("status").innerText = "Ready";
document.getElementById("lineCount").innerText = lines.length + " lines";

filterLines();
};

reader.readAsText(file);
}

/* PARSE */
function parseDump(lines){
parsedData = [];

let currentClass = "GLOBAL";

const regex = /public\s+([\w<>]+)\s+(\w+)\(.*?\).*?RVA:\s*(0x[0-9A-Fa-f]+)/;

for(let i=0;i<lines.length;i++){
let line = lines[i];

if(line.includes("class ")){
let c = line.match(/class\s+(\w+)/);
if(c) currentClass = c[1];
}

if(line.includes("RVA")){
let m = regex.exec(line);
if(m){
parsedData.push({
class: currentClass,
type: m[1],
name: m[2],
rva: m[3],
index: i
});
}
}
}
}

/* TYPES */
function buildTypes(){
const sel = document.getElementById("typeFilter");

const types = [...new Set(parsedData.map(x=>x.type))];

sel.innerHTML = '<option value="">All types</option>';

types.forEach(t=>{
let o=document.createElement("option");
o.value=t;
o.textContent=t;
sel.appendChild(o);
});
}

/* FILTER */
function filterLines(){
const search = document.getElementById("searchInput").value.toLowerCase();
const type = document.getElementById("typeFilter").value;

filteredLines = parsedData.filter(x=>{
return (!search || x.name.toLowerCase().includes(search))
&& (!type || x.type===type);
});

render();
}

/* RENDER */
function render(){
const div = document.getElementById("resultsList");
div.innerHTML = "";

if(filteredLines.length === 0){
div.innerHTML = '<p style="color:#666;padding:20px;">No results</p>';
return;
}

for(const item of filteredLines){

const el = document.createElement("div");
el.className = "result-line" + (selectedIndices.has(item.index) ? " selected" : "");

el.innerHTML = `
<span class="class">${item.class}</span>
<span class="type">${item.type}</span>
<span>${item.name}</span>
<span class="result-addr">${item.rva}</span>
`;

el.onclick = ()=>{
if(selectedIndices.has(item.index)) selectedIndices.delete(item.index);
else selectedIndices.add(item.index);
render();
};

el.ondblclick = ()=>{
navigator.clipboard.writeText(item.rva);
};

div.appendChild(el);
}
}

/* CLEAR */
function clearSelection(){
selectedIndices.clear();
render();
}

/* EXPORT */
function generateOffsets(){

let out = "// OFFSETS\n\n";

const sel = parsedData.filter(x=>selectedIndices.has(x.index));

for(const x of sel){
out += `// ${x.class} :: ${x.type} ${x.name}\n`;
out += `#define ${x.class}_${x.name}`.toUpperCase() + ` ${x.rva}\n\n`;
}

document.getElementById("outputOffsets").value = out;
}

</script>

</body>
</html>

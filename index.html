<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Offsets Extractor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; font-family: 'Courier New', monospace; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { color: #fff; font-size: 1.8em; font-weight: normal; letter-spacing: 2px; }
        .header p { color: #666; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .panel { background: #0a0a0a; border: 1px solid #333; padding: 20px; }
        .panel h3 { color: #fff; margin-bottom: 15px; font-weight: normal; }
        textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; font-size: 12px; padding: 12px; resize: vertical; }
        button { background: #111; color: #fff; border: 1px solid #333; padding: 12px 24px; cursor: pointer; font-family: monospace; margin-top: 10px; }
        button:hover { background: #222; border-color: #fff; }
        .status { margin-top: 15px; padding: 12px; background: #0a0a0a; border-left: 2px solid #fff; color: #ccc; font-size: 12px; max-height: 150px; overflow-y: auto; }
        .file-zone { border: 1px dashed #333; padding: 30px; text-align: center; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; }
        .file-zone:hover { border-color: #0f0; background: #0a0a0a; }
        .progress-container { width: 100%; background: #1a1a1a; margin-top: 10px; position: relative; }
        .progress-bar { width: 0%; height: 20px; background: #0f0; transition: width 0.3s; }
        .progress-text { position: absolute; top: 2px; left: 10px; color: #000; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>NEXUS OFFSETS EXTRACTOR</h1>
        <p>Scans ALL lines of your dump.cs - no limit, no stop until complete</p>
    </div>
    
    <div class="grid">
        <div class="panel">
            <h3>DUMP.CS FILE</h3>
            <div class="file-zone" onclick="document.getElementById('dumpFile').click()">
                <p>📁 CLICK TO SELECT DUMP.CS FILE</p>
                <p style="color:#444; font-size:12px;">Any file size - scans until the end</p>
            </div>
            <input type="file" id="dumpFile" accept=".cs,.txt" style="display:none;" onchange="startFullScan()">
            
            <div class="progress-container" style="margin-top:15px;">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            
            <div style="margin-top:10px;">
                <span id="scanStatus" style="color:#ff0;">● IDLE</span>
                <span id="linesProcessed" style="color:#666; margin-left:10px;">0 lines</span>
                <span id="foundCount" style="color:#0f0; margin-left:10px;">0/8 found</span>
            </div>
            
            <button id="cancelBtn" onclick="cancelFullScan()" style="display:none; background:#330000;">STOP SCAN</button>
        </div>
        
        <div class="panel">
            <h3>EXTRACTED OFFSETS</h3>
            <textarea id="offsetsOutput" rows="20" readonly placeholder="Offsets will appear here as they are found..."></textarea>
            <button onclick="copyOffsets()">COPY TO CLIPBOARD</button>
        </div>
    </div>
    
    <div id="status" class="status">Ready - Select a dump.cs file</div>
</div>

<script>
let fullScanActive = false;
let fullScanCancelled = false;
let currentOffsets = {};

const searchPatterns = [
    { name: 'OFFSET_GET_LOCAL_PLAYER', regex: /(?:get_LocalPlayer|LocalPlayer)[^\n]{0,200}0x([0-9A-Fa-f]{8,16})/i },
    { name: 'OFFSET_GET_PLAYERS_LIST', regex: /(?:get_Players|get_AllPlayers)[^\n]{0,200}0x([0-9A-Fa-f]{8,16})/i },
    { name: 'OFFSET_GET_TEAM', regex: /(?:get_teamNumber|get_Team|TeamID)[^\n]{0,200}0x([0-9A-Fa-f]{8,16})/i },
    { name: 'OFFSET_GET_POSITION', regex: /(?:get_position|get_Position|get_pos)[^\n]{0,200}0x([0-9A-Fa-f]{8,16})/i },
    { name: 'OFFSET_GET_ROTATION', regex: /(?:get_rotation|get_Rotation)[^\n]{0,200}0x([0-9A-Fa-f]{8,16})/i },
    { name: 'OFFSET_SET_ROTATION', regex: /(?:set_rotation|set_Rotation)[^\n]{0,200}0x([0-9A-Fa-f]{8,16})/i },
    { name: 'OFFSET_CAMERA_GET_MAIN', regex: /(?:get_main|Camera\.main)[^\n]{0,200}0x([0-9A-Fa-f]{8,16})/i },
    { name: 'OFFSET_WORLD_TO_SCREEN', regex: /(?:WorldToScreenPoint|WorldToScreen)[^\n]{0,200}0x([0-9A-Fa-f]{8,16})/i }
];

function startFullScan() {
    const file = document.getElementById('dumpFile').files[0];
    if (!file) return;
    
    // Reset
    for (const p of searchPatterns) {
        currentOffsets[p.name] = null;
    }
    
    fullScanActive = true;
    fullScanCancelled = false;
    
    document.getElementById('offsetsOutput').value = '';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').innerHTML = '0%';
    document.getElementById('cancelBtn').style.display = 'inline-block';
    document.getElementById('scanStatus').innerHTML = '● SCANNING';
    document.getElementById('scanStatus').style.color = '#0f0';
    document.getElementById('linesProcessed').innerHTML = '0 lines';
    document.getElementById('foundCount').innerHTML = '0/8 found';
    document.getElementById('status').innerHTML = `[STATUS] Scanning ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB) - This will scan ALL lines until complete.`;
    
    const chunkSize = 1024 * 512; // 512KB chunks for smoother progress
    let offset = 0;
    let leftover = '';
    let totalLines = 0;
    let lastProgressUpdate = Date.now();
    
    function readNextChunk() {
        if (fullScanCancelled) {
            finishScan(true);
            return;
        }
        
        const chunk = file.slice(offset, offset + chunkSize);
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const text = leftover + e.target.result;
            const lines = text.split('\n');
            leftover = lines.pop();
            
            // Process each line
            for (const line of lines) {
                // Search for all patterns in this line
                for (const pattern of searchPatterns) {
                    if (currentOffsets[pattern.name] === null) {
                        const match = line.match(pattern.regex);
                        if (match) {
                            currentOffsets[pattern.name] = `0x${match[1]}`;
                            updateDisplay();
                        }
                    }
                }
                totalLines++;
            }
            
            offset += chunkSize;
            const percent = Math.min(100, (offset / file.size) * 100);
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = `${Math.round(percent)}%`;
            
            // Update lines counter every 500ms
            if (Date.now() - lastProgressUpdate > 500) {
                document.getElementById('linesProcessed').innerHTML = `${(totalLines / 1000).toFixed(1)}k lines`;
                lastProgressUpdate = Date.now();
                
                const found = Object.values(currentOffsets).filter(v => v !== null).length;
                document.getElementById('foundCount').innerHTML = `${found}/8 found`;
                document.getElementById('status').innerHTML = `[STATUS] Scanning... ${Math.round(percent)}% | ${(totalLines / 1000).toFixed(1)}k lines | ${found}/8 offsets found`;
            }
            
            if (offset < file.size) {
                // Continue with next chunk
                setTimeout(readNextChunk, 1);
            } else {
                // Process leftover line
                if (leftover.trim()) {
                    for (const pattern of searchPatterns) {
                        if (currentOffsets[pattern.name] === null) {
                            const match = leftover.match(pattern.regex);
                            if (match) {
                                currentOffsets[pattern.name] = `0x${match[1]}`;
                                updateDisplay();
                            }
                        }
                    }
                }
                finishScan(false);
            }
        };
        
        reader.onerror = function() {
            document.getElementById('status').innerHTML = '[ERROR] Failed to read file';
            finishScan(true);
        };
        
        reader.readAsText(chunk);
    }
    
    function updateDisplay() {
        let output = '// ============ EXTRACTED OFFSETS ============\n\n';
        let found = 0;
        for (const [name, offset] of Object.entries(currentOffsets)) {
            if (offset !== null) {
                found++;
                output += `#define ${name}    ${offset}\n`;
            } else {
                output += `#define ${name}    0x00000000\n`;
            }
        }
        output += `\n// ${found}/8 offsets found so far\n`;
        document.getElementById('offsetsOutput').value = output;
    }
    
    function finishScan(cancelled) {
        fullScanActive = false;
        document.getElementById('cancelBtn').style.display = 'none';
        
        const found = Object.values(currentOffsets).filter(v => v !== null).length;
        
        if (cancelled) {
            document.getElementById('scanStatus').innerHTML = '● CANCELLED';
            document.getElementById('scanStatus').style.color = '#ff0';
            document.getElementById('status').innerHTML = '[CANCELLED] Scan stopped by user.';
        } else {
            document.getElementById('scanStatus').innerHTML = '● COMPLETE';
            document.getElementById('scanStatus').style.color = '#0f0';
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').innerHTML = '100%';
            
            let output = '// ============ EXTRACTED OFFSETS ============\n\n';
            for (const [name, offset] of Object.entries(currentOffsets)) {
                if (offset !== null) {
                    output += `#define ${name}    ${offset}\n`;
                } else {
                    output += `#define ${name}    0x00000000\n`;
                }
            }
            output += `\n// ${found}/8 offsets found - Scan complete\n`;
            document.getElementById('offsetsOutput').value = output;
            
            if (found === 0) {
                document.getElementById('status').innerHTML = '[WARNING] No offsets found. The dump may be obfuscated.';
            } else {
                document.getElementById('status').innerHTML = `[COMPLETE] ${found}/8 offsets found after scanning ${(totalLines / 1000).toFixed(0)}k lines.`;
            }
        }
        
        document.getElementById('foundCount').innerHTML = `${found}/8 found`;
    }
    
    readNextChunk();
}

function cancelFullScan() {
    if (fullScanActive) {
        fullScanCancelled = true;
        document.getElementById('scanStatus').innerHTML = '● CANCELLING...';
        document.getElementById('status').innerHTML = '[STATUS] Cancelling scan...';
    }
}

function copyOffsets() {
    navigator.clipboard.writeText(document.getElementById('offsetsOutput').value);
    document.getElementById('status').innerHTML = '[INFO] Offsets copied to clipboard';
}
</script>
</body>
</html>

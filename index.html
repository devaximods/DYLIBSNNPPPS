<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Debug Dump Viewer</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; font-family: monospace; }
        button { background: #0f0; color: #000; padding: 10px 20px; cursor: pointer; margin-top: 10px; }
        .preview { background: #0a0a0a; border: 1px solid #333; padding: 15px; margin-top: 15px; overflow-x: auto; white-space: pre-wrap; font-family: monospace; font-size: 11px; max-height: 300px; }
    </style>
</head>
<body>
<div class="container">
    <h1>NEXUS - DUMP DEBUGGER</h1>
    <p>Upload your dump.cs to see its format and find the correct patterns</p>
    
    <input type="file" id="dumpFile" accept=".cs,.txt">
    <button onclick="analyzeDump()">ANALYZE DUMP FORMAT</button>
    
    <div id="preview" class="preview"></div>
    <div id="status"></div>
</div>

<script>
function analyzeDump() {
    const file = document.getElementById('dumpFile').files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        const content = e.target.result;
        const lines = content.split('\n');
        
        let preview = '=== FILE INFO ===\n';
        preview += `File size: ${(content.length / 1024 / 1024).toFixed(2)} MB\n`;
        preview += `Total lines: ${lines.length.toLocaleString()}\n\n`;
        preview += '=== FIRST 50 LINES ===\n';
        
        for (let i = 0; i < Math.min(50, lines.length); i++) {
            preview += `Line ${i+1}: ${lines[i].substring(0, 200)}\n`;
        }
        
        preview += '\n=== SEARCHING FOR OFFSET PATTERNS ===\n';
        
        // Search for common offset patterns
        const patterns = [
            { name: 'RVA pattern', regex: /RVA:\s*0x([0-9A-Fa-f]+)/gi },
            { name: 'Offset pattern', regex: /Offset:\s*0x([0-9A-Fa-f]+)/gi },
            { name: '0x pattern', regex: /0x[0-9A-Fa-f]{8,16}/gi },
            { name: 'get_ function', regex: /get_\w+\s*\(/gi },
            { name: 'public function', regex: /public\s+\w+\s+\w+\s*\(/gi }
        ];
        
        for (const p of patterns) {
            const matches = content.match(p.regex);
            if (matches) {
                preview += `\n${p.name}: ${matches.length} occurrences\n`;
                preview += `Example: ${matches.slice(0, 3).join(', ')}\n`;
            } else {
                preview += `\n${p.name}: NOT FOUND\n`;
            }
        }
        
        document.getElementById('preview').innerHTML = preview.replace(/\n/g, '<br>');
        document.getElementById('status').innerHTML = 'Analysis complete. Look at the preview to understand your dump format.';
    };
    reader.readAsText(file);
}
</script>
</body>
</html>

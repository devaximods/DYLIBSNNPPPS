<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Offsets Extractor (Big File Support)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000000; font-family: 'Courier New', monospace; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .header h1 { color: #fff; font-size: 1.8em; font-weight: normal; letter-spacing: 2px; }
        .header p { color: #666; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .panel { background: #0a0a0a; border: 1px solid #333; padding: 20px; }
        .panel h3 { color: #fff; margin-bottom: 15px; font-weight: normal; }
        textarea { width: 100%; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; font-size: 12px; padding: 12px; resize: vertical; }
        button { background: #111; color: #fff; border: 1px solid #333; padding: 12px 24px; cursor: pointer; font-family: monospace; margin-top: 10px; }
        button:hover { background: #222; border-color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 12px; background: #0a0a0a; border-left: 2px solid #fff; color: #ccc; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .file-zone { border: 1px dashed #333; padding: 30px; text-align: center; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; }
        .file-zone:hover { border-color: #0f0; background: #0a0a0a; }
        .progress-bar { width: 100%; height: 3px; background: #1a1a1a; margin-top: 10px; }
        .progress-fill { width: 0%; height: 100%; background: #0f0; transition: width 0.3s; }
        .info-text { color: #666; font-size: 11px; margin-top: 5px; }
        .found-badge { color: #0f0; background: #0a0a0a; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>NEXUS OFFSETS EXTRACTOR</h1>
        <p>Analyzes dump.cs line by line - supports files of ANY size (100MB, 200MB, 500MB+)</p>
    </div>
    
    <div class="grid">
        <div class="panel">
            <h3>DUMP.CS FILE</h3>
            <div class="file-zone" id="fileZone" onclick="document.getElementById('dumpFile').click()">
                <p style="color:#666;">📁 CLICK TO SELECT DUMP.CS FILE</p>
                <p style="color:#444; font-size:12px;">Supports any file size - processes line by line</p>
            </div>
            <input type="file" id="dumpFile" accept=".cs,.txt" style="display:none;" onchange="startAnalysis()">
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <button id="cancelBtn" onclick="cancelAnalysis()" style="display:none; background:#330000;">CANCEL</button>
        </div>
        
        <div class="panel">
            <h3>EXTRACTED OFFSETS</h3>
            <textarea id="offsetsOutput" rows="20" readonly placeholder="Offsets will appear here as they are found..."></textarea>
            <button onclick="copyOffsets()">COPY TO CLIPBOARD</button>
        </div>
    </div>
    
    <div id="status" class="status">Ready - Select a dump.cs file to begin</div>
</div>

<script>
let currentOffsets = {
    'OFFSET_GET_LOCAL_PLAYER': null,
    'OFFSET_GET_PLAYERS_LIST': null,
    'OFFSET_GET_TEAM': null,
    'OFFSET_GET_POSITION': null,
    'OFFSET_GET_ROTATION': null,
    'OFFSET_SET_ROTATION': null,
    'OFFSET_CAMERA_GET_MAIN': null,
    'OFFSET_WORLD_TO_SCREEN': null
};

let isAnalyzing = false;
let analysisCancelled = false;
let totalLines = 0;
let processedLines = 0;

// Patterns to search for
const patterns = [
    { name: 'OFFSET_GET_LOCAL_PLAYER', regex: /get_LocalPlayer\s*\(\)\s*\{\s*\}\s*\/\/\s*RVA:\s*0x([0-9A-Fa-f]+)/i },
    { name: 'OFFSET_GET_PLAYERS_LIST', regex: /get_Players\s*\(\)\s*\{\s*\}\s*\/\/\s*RVA:\s*0x([0-9A-Fa-f]+)/i },
    { name: 'OFFSET_GET_TEAM', regex: /get_teamNumber\s*\(\)\s*\{\s*\}\s*\/\/\s*RVA:\s*0x([0-9A-Fa-f]+)/i },
    { name: 'OFFSET_GET_POSITION', regex: /get_position\s*\(\)\s*\{\s*\}\s*\/\/\s*RVA:\s*0x([0-9A-Fa-f]+)/i },
    { name: 'OFFSET_GET_ROTATION', regex: /get_rotation\s*\(\)\s*\{\s*\}\s*\/\/\s*RVA:\s*0x([0-9A-Fa-f]+)/i },
    { name: 'OFFSET_SET_ROTATION', regex: /set_rotation\s*\([^)]+\)\s*\{\s*\}\s*\/\/\s*RVA:\s*0x([0-9A-Fa-f]+)/i },
    { name: 'OFFSET_CAMERA_GET_MAIN', regex: /get_main\s*\(\)\s*\{\s*\}\s*\/\/\s*RVA:\s*0x([0-9A-Fa-f]+)/i },
    { name: 'OFFSET_WORLD_TO_SCREEN', regex: /WorldToScreenPoint\s*\([^)]+\)\s*\{\s*\}\s*\/\/\s*RVA:\s*0x([0-9A-Fa-f]+)/i }
];

function startAnalysis() {
    const file = document.getElementById('dumpFile').files[0];
    if (!file) return;
    
    // Reset
    for (let key in currentOffsets) {
        currentOffsets[key] = null;
    }
    isAnalyzing = true;
    analysisCancelled = false;
    totalLines = 0;
    processedLines = 0;
    
    document.getElementById('offsetsOutput').value = '';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('cancelBtn').style.display = 'inline-block';
    document.getElementById('status').innerHTML = `[STATUS] Analyzing ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)... Line by line processing...`;
    
    // Process file line by line using File API streaming
    const chunkSize = 1024 * 1024; // 1 MB chunks
    let offset = 0;
    let leftover = '';
    
    function processNextChunk() {
        if (analysisCancelled) {
            document.getElementById('status').innerHTML = '[STATUS] Analysis cancelled';
            isAnalyzing = false;
            document.getElementById('cancelBtn').style.display = 'none';
            return;
        }
        
        const chunk = file.slice(offset, offset + chunkSize);
        const reader = new FileReader();
        
        reader.onload = function(e) {
            let text = leftover + e.target.result;
            const lines = text.split('\n');
            
            // Keep last line if it might be incomplete
            leftover = lines.pop();
            
            // Process each line
            for (const line of lines) {
                processLine(line);
                processedLines++;
            }
            
            offset += chunkSize;
            const percent = Math.min(100, (offset / file.size) * 100);
            document.getElementById('progressFill').style.width = `${percent}%`;
            
            // Update status with progress
            const foundCount = Object.values(currentOffsets).filter(v => v !== null).length;
            document.getElementById('status').innerHTML = `[STATUS] Processing... ${Math.round(percent)}% | Lines: ${(processedLines/1000).toFixed(0)}k | Found: ${foundCount}/8 offsets`;
            
            if (offset < file.size) {
                // Small delay to let UI breathe
                setTimeout(processNextChunk, 10);
            } else {
                // Process leftover
                if (leftover.trim()) {
                    processLine(leftover);
                }
                finishAnalysis();
            }
        };
        
        reader.onerror = function() {
            document.getElementById('status').innerHTML = '[ERROR] Failed to read file';
            isAnalyzing = false;
            document.getElementById('cancelBtn').style.display = 'none';
        };
        
        reader.readAsText(chunk);
    }
    
    function processLine(line) {
        // Check each pattern
        for (const pattern of patterns) {
            if (currentOffsets[pattern.name] === null) {
                const match = line.match(pattern.regex);
                if (match) {
                    currentOffsets[pattern.name] = `0x${match[1]}`;
                    updateOutputDisplay();
                    document.getElementById('status').innerHTML = `[FOUND] ${pattern.name}: 0x${match[1]} | ${Object.values(currentOffsets).filter(v => v !== null).length}/8 found`;
                }
            }
        }
    }
    
    function updateOutputDisplay() {
        let output = '// ============ EXTRACTED OFFSETS ============\n\n';
        let found = 0;
        for (const [name, offset] of Object.entries(currentOffsets)) {
            if (offset !== null) {
                found++;
                output += `#define ${name}    ${offset}\n`;
            } else {
                output += `#define ${name}    0x00000000  // NOT FOUND YET\n`;
            }
        }
        output += `\n// ${found}/8 offsets found so far (searching continues...)\n`;
        document.getElementById('offsetsOutput').value = output;
    }
    
    function finishAnalysis() {
        isAnalyzing = false;
        document.getElementById('cancelBtn').style.display = 'none';
        
        let output = '// ============ EXTRACTED OFFSETS ============\n\n';
        let found = 0;
        for (const [name, offset] of Object.entries(currentOffsets)) {
            if (offset !== null) {
                found++;
                output += `#define ${name}    ${offset}\n`;
            } else {
                output += `#define ${name}    0x00000000  // NOT FOUND\n`;
            }
        }
        output += `\n// ${found}/8 offsets found\n`;
        document.getElementById('offsetsOutput').value = output;
        document.getElementById('progressFill').style.width = '100%';
        
        if (found === 8) {
            document.getElementById('status').innerHTML = '[SUCCESS] All 8 offsets found!';
        } else {
            document.getElementById('status').innerHTML = `[COMPLETE] ${found}/8 offsets found. Some offsets may not exist in this dump.`;
        }
        
        // Auto-scroll to bottom of output
        const textarea = document.getElementById('offsetsOutput');
        textarea.scrollTop = textarea.scrollHeight;
    }
    
    processNextChunk();
}

function cancelAnalysis() {
    analysisCancelled = true;
    isAnalyzing = false;
    document.getElementById('status').innerHTML = '[STATUS] Cancelling... Please wait';
}

function copyOffsets() {
    const text = document.getElementById('offsetsOutput').value;
    navigator.clipboard.writeText(text);
    document.getElementById('status').innerHTML = '[INFO] Offsets copied to clipboard';
}
</script>
</body>
</html>

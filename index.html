<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Dylib Builder</title>
    <style>
        body { background: #0a0a1a; font-family: monospace; color: #0f0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #0a0a2a; padding: 30px; border-radius: 20px; border: 1px solid #0f0; }
        textarea { width: 100%; height: 400px; background: #000; color: #0f0; border: 1px solid #0f0; font-family: monospace; padding: 10px; }
        button { background: #0f0; color: #000; padding: 15px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
        .status { margin-top: 20px; padding: 15px; background: #000; border-left: 4px solid #0f0; }
        .link { margin-top: 15px; padding: 10px; background: #000; word-break: break-all; }
        a { color: #0f0; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ NEXUS DYLIB BUILDER ⚡</h1>
    <p>Colle ton code Tweak.x ci-dessous :</p>
    <textarea id="tweakCode" placeholder='#import <UIKit/UIKit.h>

%hook AppDelegate

- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
    NSLog(@"✅ Dylib chargé");
    return %orig;
}

%end'></textarea>
    <button id="generateBtn">🚀 GÉNÉRER LE DYLIB</button>
    <div id="status" class="status">📡 Statut : Prêt</div>
    <div id="link" class="link" style="display:none"></div>
</div>

<script>
    // ⚠️ Pour que ça marche, tu dois :
    // 1. Créer un token GitHub (Settings > Developer settings > Personal access tokens)
    // 2. Remplacer 'TON_TOKEN_ICI' par ton token
    // 3. Sauvegarder ce fichier sur ton PC (pas sur GitHub)
    const GITHUB_TOKEN = 'TON_TOKEN_ICI'; // ← Remplace par ton token (usage local uniquement)
    
    const REPO_OWNER = 'devaximods';
    const REPO_NAME = 'ESPBox';
    const BRANCH = 'main';

    async function updateFile(path, content, commitMessage) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
        let sha = '';
        try {
            const getRes = await fetch(url, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });
            if (getRes.ok) {
                const data = await getRes.json();
                sha = data.sha;
            }
        } catch(e) {}
        
        const body = { message: commitMessage, content: btoa(unescape(encodeURIComponent(content))), branch: BRANCH };
        if (sha) body.sha = sha;
        
        const res = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`Erreur ${path}: ${res.status}`);
        return await res.json();
    }

    async function triggerWorkflow() {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/build.yml/dispatches`;
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ ref: BRANCH })
        });
        if (!res.ok) throw new Error(`Erreur workflow: ${res.status}`);
    }

    async function getLatestArtifact() {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/artifacts`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
        const data = await res.json();
        if (data.artifacts && data.artifacts.length > 0) {
            return data.artifacts[0].archive_download_url;
        }
        return null;
    }

    function getMakefile() {
        return `export TARGET = iphone:latest:15.0
export ARCHS = arm64

include $(THEOS)/makefiles/common.mk

TWEAK_NAME = NexusMod
NexusMod_FILES = Tweak.x
NexusMod_FRAMEWORKS = UIKit StoreKit

include $(THEOS)/makefiles/tweak.mk`;
    }

    function getControl() {
        return `Package: com.nexus.mod
Name: NexusMod
Version: 1.0
Architecture: iphoneos-arm64
Description: Nexus Mod Menu
Maintainer: nexus
Author: nexus
Section: Tweaks`;
    }

    function getPlist() {
        return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>Filter</key>
    <dict>
        <key>Bundles</key>
        <array>
            <string>com.apple.UIKit</string>
        </array>
    </dict>
</dict>
</plist>`;
    }

    document.getElementById('generateBtn').onclick = async () => {
        const tweakCode = document.getElementById('tweakCode').value;
        if (!tweakCode.trim()) { alert('Colle ton code !'); return; }

        document.getElementById('status').innerHTML = '📡 Statut : Envoi à GitHub...';
        try {
            await updateFile('Tweak.x', tweakCode, 'Update Tweak.x');
            await updateFile('Makefile', getMakefile(), 'Update Makefile');
            await updateFile('control', getControl(), 'Update control');
            await updateFile('NexusMod.plist', getPlist(), 'Update plist');
            document.getElementById('status').innerHTML = '📡 Statut : Compilation lancée...';
            await triggerWorkflow();
            
            let attempts = 0;
            let artifactUrl = null;
            while (attempts < 30 && !artifactUrl) {
                await new Promise(r => setTimeout(r, 10000));
                artifactUrl = await getLatestArtifact();
                attempts++;
                document.getElementById('status').innerHTML = `📡 Statut : Compilation... (${attempts * 10}s)`;
            }
            
            if (artifactUrl) {
                document.getElementById('status').innerHTML = '✅ Compilation terminée !';
                document.getElementById('link').style.display = 'block';
                document.getElementById('link').innerHTML = `<a href="${artifactUrl}" target="_blank">📦 Télécharger le .dylib</a>`;
            } else {
                document.getElementById('status').innerHTML = '⚠️ Va sur GitHub Actions pour voir.';
            }
        } catch (error) {
            document.getElementById('status').innerHTML = `❌ Erreur : ${error.message}`;
        }
    };
</script>
</body>
</html>
